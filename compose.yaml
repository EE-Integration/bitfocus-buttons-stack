services:
  buttons:
    image: efg01/bitfocus-buttons:${IMAGE_TAG:-latest}
    container_name: bitfocus_buttons
    restart: unless-stopped
    network_mode: host

    security_opt:
      - no-new-privileges:true

    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 512M

    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 4096
        hard: 4096

    cap_drop:
      - ALL
    cap_add:
      - SETUID   # entrypoint su: root → buttons
      - SETGID   # entrypoint su: root → buttons

    environment:
      - TZ=America/New_York

    volumes:
      - buttons_config:/home/buttons/.config/bitfocus-buttons
      - buttons_pgdata:/var/lib/postgresql
      - buttons_logs:/var/log

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4440/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        tag: "{{.Name}}/{{.ID}}"

volumes:
  buttons_config:
    driver: local
  buttons_pgdata:
    driver: local
  buttons_logs:
    driver: local
